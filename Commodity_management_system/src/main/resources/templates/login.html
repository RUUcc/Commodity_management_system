<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 商品管理系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        /* 全屏背景图容器 */
        .bg-cover {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: url(/photo/11.webp) no-repeat center center;
            background-size: cover;
            z-index: -2;
        }
        /* 背景遮罩 */
        .bg-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.35);
            z-index: -1;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #667eea;
            font-family: 'Microsoft YaHei', sans-serif;
        }
        .login-box {
            width: 400px;
            padding: 40px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .login-box h1 {
            text-align: center;
            margin-bottom: 8px;
            color: #333;
            font-size: 24px;
        }
        .login-box h1 span {
            display: block;
            font-size: 14px;
            color: #999;
            margin-top: 5px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            color: #555;
            font-size: 14px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn-login {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 6px;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            transition: opacity 0.3s;
        }
        .btn-login:hover { opacity: 0.9; }
        .error-msg {
            background: #fff5f5;
            color: #e53e3e;
            padding: 12px 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
            border: 1px solid #fed7d7;
            display: none;
        }
        .error-msg.show { display: block; }
    </style>
</head>
<body>

    <!-- 背景图层：z-index 负值，位于内容下方 -->
    <div class="bg-cover"></div>
    <div class="bg-overlay"></div>

    <div class="login-box">
        <h1>商品管理系统 <span>后台管理登录</span></h1>

        <div id="errorMsg" class="error-msg" th:if="${error}" th:text="${error}">用户名或密码错误</div>

        <form action="/doLogin" th:action="@{/doLogin}" method="post">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" name="username" th:value="${username}" placeholder="请输入用户名" required autocomplete="off">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" name="password" placeholder="请输入密码" required autocomplete="off">
            </div>
            <button type="submit" class="btn-login">登 录</button>
        </form>
    </div>

    <script>
        var errEl = document.getElementById('errorMsg');
        if (errEl && errEl.textContent.trim()) {
            errEl.classList.add('show');
        }
    </script>
</body>
</html>
