<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', sans-serif; background: #f4f6f9; }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff; padding: 0 30px; height: 60px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .header .sys-name { font-size: 18px; font-weight: bold; }
        .header a { color: #ffd700; text-decoration: none; font-size: 14px; }
        .header a:hover { text-decoration: underline; }
        .container { max-width: 1000px; margin: 25px auto; padding: 0 20px; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn { padding: 8px 18px; border: none; border-radius: 5px; cursor: pointer; font-size: 14px; }
        .btn:hover { opacity: 0.85; }
        .btn-primary { background: #667eea; color: #fff; }
        .btn-success { background: #48bb78; color: #fff; }
        .btn-danger  { background: #f56565; color: #fff; }
        .btn-secondary { background: #a0aec0; color: #fff; }
        .table-box {
            background: #fff; border-radius: 8px;
            box-shadow: 0 1px 6px rgba(0,0,0,0.06); overflow: hidden;
        }
        table { width: 100%; border-collapse: collapse; }
        table th {
            background: #f7fafc; color: #4a5568; font-size: 13px;
            padding: 12px 10px; text-align: left; border-bottom: 2px solid #e2e8f0;
        }
        table td { padding: 10px; font-size: 14px; border-bottom: 1px solid #edf2f7; }
        table tbody tr:hover { background: #f7fafc; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 1px solid #eee; }
        .no-avatar { width: 40px; height: 40px; border-radius: 50%; background: #edf2f7;
                     display: inline-flex; align-items: center; justify-content: center;
                     font-size: 16px; color: #a0aec0; }
        .pagination {
            display: flex; justify-content: center; align-items: center;
            padding: 20px; gap: 5px;
        }
        .pagination a, .pagination span {
            padding: 7px 13px; border-radius: 5px; font-size: 14px;
            text-decoration: none; border: 1px solid #e2e8f0; color: #4a5568;
        }
        .pagination a:hover { background: #667eea; color: #fff; border-color: #667eea; }
        .pagination .active { background: #667eea; color: #fff; border-color: #667eea; font-weight: bold; }
        .pagination .disabled { color: #cbd5e0; pointer-events: none; }
        .pagination .info { font-size: 13px; color: #a0aec0; margin-left: 10px; }
        /* 弹窗 */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 999;
            justify-content: center; align-items: center;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: #fff; border-radius: 10px; padding: 30px; width: 450px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .modal h3 { margin-bottom: 20px; font-size: 18px; }
        .modal .form-group { margin-bottom: 15px; }
        .modal .form-group label { display: block; font-size: 13px; color: #666; margin-bottom: 4px; }
        .modal .form-group input { width: 100%; padding: 9px 12px; border: 1px solid #ddd; border-radius: 5px; font-size: 14px; }
        .modal .btn-row { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
        .modal img.preview { max-width: 80px; max-height: 80px; border-radius: 50%; margin-top: 8px; }
    </style>
</head>
<body>
    <div class="header">
        <span class="sys-name">👤 用户管理</span>
        <span>
            <a th:href="@{/index}">返回首页</a> &nbsp;|&nbsp;
            <a th:href="@{/logout}">退出登录</a>
        </span>
    </div>

    <div class="container">
        <div class="top-bar">
            <span style="color:#666;">用户总数：<strong th:text="${page.total}">0</strong></span>
            <button class="btn btn-success" onclick="openAddModal()">＋ 新增用户</button>
        </div>

        <div class="table-box">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>头像</th>
                        <th>用户名</th>
                        <th>创建时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="u : ${page.records}">
                        <td th:text="${u.id}">1</td>
                        <td>
                            <img th:if="${u.avatar}" th:src="${u.avatar}" class="avatar">
                            <span th:unless="${u.avatar}" class="no-avatar">👤</span>
                        </td>
                        <td th:text="${u.username}">admin</td>
                        <td th:text="${#temporals.format(u.createTime, 'yyyy-MM-dd HH:mm')}">-</td>
                        <td>
                            <button class="btn" style="padding:4px 10px;font-size:12px;background:#667eea;color:#fff;"
                                    th:attr="data-id=${u.id}" onclick="openEditModal(this.dataset.id)">编辑</button>
                            <button class="btn" style="padding:4px 10px;font-size:12px;background:#f56565;color:#fff;"
                                    th:attr="data-id=${u.id}" onclick="doDelete(this.dataset.id)">删除</button>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(page.records)}">
                        <td colspan="5" style="text-align:center;padding:40px;color:#a0aec0;">暂无数据</td>
                    </tr>
                </tbody>
            </table>

            <div class="pagination" th:if="${page.total > 0}">
                <a th:classappend="${page.current <= 1} ? 'disabled'"
                   th:href="@{/user/list(pageNum=${page.current - 1})}">上一页</a>
                <th:block th:each="i : ${#numbers.sequence(1, page.pages)}">
                    <th:block th:if="${i >= page.current - 2 && i <= page.current + 2}">
                        <a th:text="${i}" th:classappend="${i == page.current} ? 'active'"
                           th:href="@{/user/list(pageNum=${i})}"></a>
                    </th:block>
                </th:block>
                <a th:classappend="${page.current >= page.pages} ? 'disabled'"
                   th:href="@{/user/list(pageNum=${page.current + 1})}">下一页</a>
                <span class="info" th:text="'共 ' + ${page.total} + ' 条'"></span>
            </div>
        </div>
    </div>

    <!-- 弹窗 -->
    <div id="modalOverlay" class="modal-overlay">
        <div class="modal">
            <h3 id="modalTitle">新增用户</h3>
            <form id="userForm" enctype="multipart/form-data">
                <input type="hidden" id="editId" name="id">
                <div class="form-group">
                    <label>用户名 *</label>
                    <input type="text" name="username" id="formUsername" required>
                </div>
                <div class="form-group">
                    <label>密码 *</label>
                    <input type="text" name="password" id="formPassword" required>
                </div>
                <div class="form-group">
                    <label>头像</label>
                    <input type="file" name="avatarFile" accept="image/*" onchange="previewAvatar(this)">
                    <img id="avatarPreview" class="preview" style="display:none;">
                </div>
                <div class="btn-row">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">取消</button>
                    <button type="submit" class="btn btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function openModal() { document.getElementById('modalOverlay').classList.add('active'); }
        function closeModal() { document.getElementById('modalOverlay').classList.remove('active'); resetForm(); }
        function resetForm() {
            document.getElementById('userForm').reset();
            document.getElementById('editId').value = '';
            document.getElementById('avatarPreview').style.display = 'none';
        }
        function previewAvatar(input) {
            var p = document.getElementById('avatarPreview');
            if (input.files && input.files[0]) {
                var r = new FileReader();
                r.onload = function(e) { p.src = e.target.result; p.style.display = 'block'; };
                r.readAsDataURL(input.files[0]);
            } else { p.style.display = 'none'; }
        }
        function openAddModal() {
            resetForm();
            document.getElementById('modalTitle').innerText = '新增用户';
            document.getElementById('userForm').action = '/user/add';
            document.getElementById('formPassword').required = true;
            document.getElementById('formPassword').parentElement.style.display = '';
            openModal();
        }
        function openEditModal(id) {
            resetForm();
            document.getElementById('modalTitle').innerText = '编辑用户';
            document.getElementById('userForm').action = '/user/edit';
            document.getElementById('formPassword').required = false;
            document.getElementById('formPassword').parentElement.style.display = 'none';
            fetch('/user/get?id=' + id)
                .then(r => r.json())
                .then(res => {
                    if (res.code === 200) {
                        var u = res.data;
                        document.getElementById('editId').value = u.id;
                        document.getElementById('formUsername').value = u.username;
                        if (u.avatar) {
                            document.getElementById('avatarPreview').src = u.avatar;
                            document.getElementById('avatarPreview').style.display = 'block';
                        }
                        openModal();
                    } else { alert(res.msg); }
                });
        }
        document.getElementById('userForm').addEventListener('submit', function(e) {
            e.preventDefault();
            var formData = new FormData(this);
            fetch(this.action, { method: 'POST', body: formData })
                .then(r => r.json())
                .then(res => { alert(res.msg); if (res.code === 200) location.reload(); });
        });
        function doDelete(id) {
            if (!confirm('确定要删除该用户吗？')) return;
            fetch('/user/delete?id=' + id)
                .then(r => r.json())
                .then(res => { alert(res.msg); if (res.code === 200) location.reload(); });
        }
        document.getElementById('modalOverlay').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
    </script>
</body>
</html>
